<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/src/assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <script>
      (() => {
        const theme = localStorage.getItem('theme')
        const resolvedTheme = theme === 'light' || theme === 'dark' || theme === 'auto' ? theme : 'auto'
        const isDark = resolvedTheme === 'dark' || (resolvedTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', isDark)
      })()
    </script>
    <title>XKeen UI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
