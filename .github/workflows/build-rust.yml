name: Build Rust binaries
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: arm64-v8a
            toolchain: stable
          - target: mips-unknown-linux-musl
            name: mips32
            toolchain: nightly
          - target: mipsel-unknown-linux-musl
            name: mips32le
            toolchain: nightly
    steps:
      - uses: actions/checkout@v6
      - name: Set version
        run: |
          sed -i 's/^version = .*/version = "${{ inputs.version }}"/' backend/Cargo.toml
          sed -i 's/version = "v/version = "/' backend/Cargo.toml
          cat backend/Cargo.toml
      - name: Install Rust
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ matrix.target }}
      - name: Install cross
        run: type cross || cargo install cross --git https://github.com/cross-rs/cross
      - name: Setup Cross.toml
        working-directory: backend
        run: |
          cat <<EOF > Cross.toml
          [target.mips-unknown-linux-musl]
          image = "rustembedded/cross:mips-unknown-linux-musl"
          build-std = ["core", "alloc", "std", "panic_abort"]
          [target.mipsel-unknown-linux-musl]
          image = "rustembedded/cross:mipsel-unknown-linux-musl"
          build-std = ["core", "alloc", "std", "panic_abort"]
          EOF
      - name: Check metadata
        working-directory: backend
        run: cargo metadata --format-version 1
      - name: Build binary
        working-directory: backend
        run: |
          cross +${{ matrix.toolchain }} build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/xkeen-ui ../xkeen-ui-${{ matrix.name }}
      - uses: actions/upload-artifact@v7
        with:
          name: xkeen-ui-${{ matrix.name }}
          path: xkeen-ui-${{ matrix.name }}

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
          node-version: latest

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install
          pnpm run build

      - name: Pack static files
        run: tar -czf xkeen-ui-static.tar.gz -C frontend/dist .

      - uses: actions/upload-artifact@v7
        with:
          name: xkeen-ui-static
          path: xkeen-ui-static.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build, static]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          prerelease: true
          files: artifacts/**/**
