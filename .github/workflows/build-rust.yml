name: Build Rust binaries
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        working-directory: frontend
        run: bun install && bun run build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  build:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: arm64-v8a
            toolchain: stable
          - target: mipsel-unknown-linux-musl
            name: mips32le
            toolchain: nightly
            rustflags: "-C target-feature=+crt-static -L /usr/local/mipsel-linux-muslsf/lib -L /usr/local/lib/gcc/mipsel-linux-muslsf/9.2.0"
          - target: mips-unknown-linux-musl
            name: mips32
            toolchain: nightly
            rustflags: "-C target-feature=+crt-static -L /usr/local/mips-linux-muslsf/lib -L /usr/local/lib/gcc/mips-linux-muslsf/9.2.0"
          # - target: mipsel-unknown-linux-gnu
          #   name: mips32le-gnu
          #   toolchain: nightly
          #   rustflags: "-C target-feature=+crt-static"
    steps:
      - uses: actions/checkout@v7

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set version
        run: |
          sed -i 's/^version = .*/version = "${{ inputs.version }}"/' backend/Cargo.toml
          sed -i 's/version = "v/version = "/' backend/Cargo.toml
          cat backend/Cargo.toml

      - name: Install Rust
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal -c rust-src

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ matrix.target }}

      - name: Install cross
        run: type cross || cargo install cross --git https://github.com/cross-rs/cross

      # - name: Setup Cross.toml
      #   working-directory: backend
      #   run: |
      #     cat <<'EOF' > Cross.toml
      #     [target.mips-unknown-linux-musl]
      #     image = "ghcr.io/cross-rs/mips-unknown-linux-musl:edge"
      #     build-std = ["std", "panic_abort", "proc_macro"]
      #
      #     [target.mipsel-unknown-linux-musl]
      #     image = "ghcr.io/cross-rs/mipsel-unknown-linux-musl:edge"
      #     build-std = ["std", "panic_abort", "proc_macro"]
      #
      #     [target.mipsel-unknown-linux-gnu]
      #     build-std = ["std", "panic_abort", "proc_macro"]
      #     EOF
      #
      - name: Check metadata
        working-directory: backend
        run: cargo metadata --format-version 1

      - name: Inject frontend dist for cross
        working-directory: backend
        run: |
          cp -r ../frontend/dist ./dist
          sed -i 's|\.\./frontend/dist|./dist|' src/frontend_embedder.rs

      - name: Build binary
        working-directory: backend
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cross +${{ matrix.toolchain }} build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/xkeen-ui ../xkeen-ui-${{ matrix.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: xkeen-ui-${{ matrix.name }}
          path: xkeen-ui-${{ matrix.name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          prerelease: true
          files: artifacts/xkeen-ui-*/*
